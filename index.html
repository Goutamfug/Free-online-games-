<!DOCTYPE html>
<html>
<head>

<title>Free Online Games</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:26px;
}

nav{
background:#1e293b;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-size:18px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.game{
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:10px;
}

.ad{
background:#334155;
margin:20px;
padding:20px;
text-align:center;
}

footer{
background:#020617;
padding:15px;
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<header>
🎮 Free Online Games
</header>

<nav>

<a href="#">Home</a>
<a href="#">Arcade</a>
<a href="#">Puzzle</a>
<a href="#">Racing</a>

</nav>

<div class="ad">
Ad Space (Google AdSense)
</div>

<div class="container">

<div class="game">
<h3>Snake Game</h3>
<iframe src="https://playsnake.org/"></iframe>
</div>

<div class="game">
<h3>2048 Puzzle</h3>
<iframe src="https://play2048.co/"></iframe>
</div>

<div class="game">
<h3>Tetris</h3>
<iframe src="https://tetris.com/play-tetris"></iframe>
</div>

<div class="game">
<h3>Flappy Bird</h3>
<iframe src="https://flappybird.io/"></iframe>
</div>

<div class="game">
<h3>Chess Game</h3>
<iframe src="https://www.chess.com/play/computer"></iframe>
</div>

<div class="game">
<h3>Car Racing</h3>
<iframe src="https://www.crazygames.com/embed/racing-game"></iframe>
</div>

</div>

<div class="ad">
Ad Space (Google AdSense)
</div>

<footer>

© 2026 Free Online Games

</footer>

</body>
</html>
