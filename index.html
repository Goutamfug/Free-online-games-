<!DOCTYPE html>
<html>
<head>

<title>Free Online Games</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
display:grid;
grid-template-columns:1fr;
gap:20px;
padding:15px;
}

.game{
background:#1e293b;
padding:10px;
border-radius:10px;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
background:#6366f1;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<header>
🎮 Free Online Games
</header>

<div class="container">

<div class="game">

<h2>Snake Game</h2>

<iframe id="game1"
src="https://www.crazygames.com/embed/snake"></iframe>

<button onclick="fullscreen('game1')">Full Screen</button>

</div>

<div class="game">

<h2>Tetris</h2>

<iframe id="game2"
src="https://www.crazygames.com/embed/tetris"></iframe>

<button onclick="fullscreen('game2')">Full Screen</button>

</div>

<div class="game">

<h2>Car Racing</h2>

<iframe id="game3"
src="https://www.crazygames.com/embed/racing-game"></iframe>

<button onclick="fullscreen('game3')">Full Screen</button>

</div>

</div>

<script>

function fullscreen(id){

let elem = document.getElementById(id);

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}

</script>

</body>
</html>
